<!DOCTYPE html>
<html>
<head>
<title>Task Complete</title>
<style>
body{
  background:#0f172a;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
  padding-top:100px;
}
.box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  display:inline-block;
}
#code{
  font-size:30px;
  margin-top:20px;
  color:#22c55e;
}
</style>
</head>
<body>

<div class="box">
  <h2>✅ Task Completed</h2>
  <p>Your Secret Code:</p>
  <h1 id="code">Loading...</h1>
</div>

<script>
let code = "RWX" + Math.floor(Math.random()*100000);

setTimeout(()=>{
  document.getElementById("code").innerText = code;

  // send code to server
  fetch("https://YOUR-SERVER.onrender.com/save", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({code:code})
  });

}, 4000);
</script>

</body>
</html>
